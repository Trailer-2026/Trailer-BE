name: '✨ Feature'
description: '새로운 기능 추가. 생성 시 Jira Task와 feat/TRA-... 브랜치가 자동 생성됩니다.'
title: '[feat] '
labels: [feature]
body:
  - type: textarea
    id: description
    attributes:
      label: '📝 Description'
      description: '어떤 기능인지 설명해주세요'
      placeholder: '설명을 작성해주세요'
    validations:
      required: true
  - type: textarea
    id: todo
    attributes:
      label: '✅ To Do List'
      description: '필요한 작업 목록을 작성해주세요'
      value: |
        - [ ] 작업1
        - [ ] 작업2
  - type: textarea
    id: etc
    attributes:
      label: '📚 Etc'
      description: '작업 중 특이사항이 있으면 적어주세요'