name: Deploy to GCP VM
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: GCP VM SSH 접속 후 배포
        uses: appleboy/ssh-action@v1   # 최신 태그는 마켓플레이스에서 확인 후 고정
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/dabin/Trailer-BE
            git pull origin main
            
            # 1. 기존에 추가된 [ALARM] 섹션이 있다면, 그 줄부터 파일 끝($)까지 삭제해서 초기화
            # 이렇게 하면 수동으로 적어둔 윗부분 설정들은 안전하게 보존됩니다.
            sed -i '/\[ALARM\]/,$d' config/properties_dev.ini
            
            # 2. 파일 끝에 깨끗하게 최신 설정 추가
            echo "" >> config/properties_dev.ini
            echo "[ALARM]" >> config/properties_dev.ini
            echo "ENV=production" >> config/properties_dev.ini
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> config/properties_dev.ini
            
            .venv/bin/pip install -r requirements.txt
            sudo systemctl restart trailer-be