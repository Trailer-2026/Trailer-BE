name: GitHub 이슈 → Jira 이슈 생성 및 브랜치 자동화 (테스트 2단계)
on:
  issues:
    types:
      - opened

jobs:
  create-jira-and-branch:
    name: Jira Task 생성 및 브랜치 생성
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: dev 브랜치 체크아웃
        uses: actions/checkout@v4
        with:
          ref: dev

      # [체크 1] 이 액션이 성공하는지 확인 (주석 해제)
      - name: Github 이슈 마크다운을 Jira 마크다운 문법으로 변환
        uses: peter-evans/jira2md@v1
        id: md2jira
        with:
          input-text: |
            ### Github Issue Link
            - ${{ github.event.issue.html_url }}
            ${{ github.event.issue.body }}
          mode: md2jira

      # [수정] 정규식 가독성 및 정확도 향상
      - name: 이슈 타입 추출
        id: extract_issue_type
        run: |
          TITLE="${{ github.event.issue.title }}"
          # [fix] 에서 fix만 추출하는 더 확실한 방법
          TYPE=$(echo "$TITLE" | grep -oP '\[\K[^\]]+(?=\])' | tr '[:upper:]' '[:lower:]' | head -n 1)
          echo "issue_type=$TYPE" >> $GITHUB_OUTPUT
          echo "Extracted Type: $TYPE"

      - name: 테스트 결과 출력
        run: |
          echo "Jira 변환 결과: ${{ steps.md2jira.outputs.output-text }}"
          echo "추출된 타입: ${{ steps.extract_issue_type.outputs.issue_type }}"

      # 나머지 액션은 아직 주석 유지 (하나씩 풀면서 범인 찾기)
      # - name: Jira Task 생성 ...